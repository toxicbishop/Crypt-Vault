name: Build and Test Crypt Vault

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Build secp256k1
        shell: msys2 {0}
        run: |
          cd src/vendor/secp256k1
          cmake -B build -G Ninja -DSECP256K1_ENABLE_MODULE_RECOVERY=ON
          cmake --build build

      - name: Compile Crypt Vault (C++17)
        shell: msys2 {0}
        run: |
          mkdir -p build || true
          SECP256K1_LIB=$(find src/vendor/secp256k1/build -name "libsecp256k1.a" | head -n 1)
          g++ -o build/Crypt-Vault.exe src/Crypt-Vault.cpp src/blockchain_audit.cpp src/p2p_node.cpp src/eth_logger.cpp src/vendor/keccak/keccak.cpp -std=c++17 -Wall -Wextra -O2 -I include -I src/vendor/secp256k1/include -DJSON_HAS_CPP_14 -D_WIN32_WINNT=0x0A00 -DSECP256K1_STATIC -static -lssl -lcrypto -lws2_32 -lz -ladvapi32 -lcrypt32 -lgdi32 -lbcrypt $SECP256K1_LIB

      - name: Run E2E Encryption/Decryption Test
        shell: powershell
        run: |
          # Create a dummy test file
          Set-Content -Path test.txt -Value "Secure Message 123"

          # Use CLI mode to encrypt and decrypt (no interactive menu needed)
          # --encrypt <input> -p <password> -o <output>
          .\build\Crypt-Vault.exe --encrypt test.txt -p mypassword -o test.enc
          if ($LASTEXITCODE -ne 0) { Write-Error "Encryption failed"; exit 1 }

          # --decrypt <input> -p <password> -o <output>
          .\build\Crypt-Vault.exe --decrypt test.enc -p mypassword -o decrypted.txt
          if ($LASTEXITCODE -ne 0) { Write-Error "Decryption failed"; exit 1 }

          Write-Host "`n--- Directory Listing (Debugging) ---"
          dir
          Write-Host "---------------------------------------"

          # Verify that the decrypted text exactly matches the original text
          $mismatch = Compare-Object (Get-Content test.txt) (Get-Content decrypted.txt)
          if ($mismatch) {
              Write-Error "Test failed: Decrypted file does not match original."
              exit 1
          } else {
              Write-Host "Test passed! Files matched."
          }
